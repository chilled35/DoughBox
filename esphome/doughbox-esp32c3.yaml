# ----------------------------------------------------------------------------
# MQTT: publish state, subscribe to remote commands
# ----------------------------------------------------------------------------
mqtt:
  broker: 192.168.0.210
  username: mosquitto
  password: mosquitto
  discovery: false                # don't auto-create HA entities; the API does that
  birth_message:
    topic: doughbox/status
    payload: online
    retain: true
  will_message:
    topic: doughbox/status
    payload: offline
    retain: true
  on_json_message:
    topic: doughbox/cmd
    then:
      - lambda: |-
          // Expected JSON: {"cmd":"start","low":3.0,"high":5.0}
          // or:            {"cmd":"stop"}
          if (!x.containsKey("cmd")) {
            ESP_LOGW("mqtt", "Cmd missing 'cmd' field");
            return;
          }
          std::string cmd = x["cmd"].as<std::string>();
          if (cmd == "start") {
            float low  = x["low"]  | 3.0f;
            float high = x["high"] | 5.0f;
            ESP_LOGI("mqtt", "CMD start low=%.1f high=%.1f", low, high);
            doughbox_prefs::save_all(1.0f, low, high);
            auto call = id(dough_climate).make_call();
            call.set_mode("HEAT_COOL");
            call.set_target_temperature_low(low);
            call.set_target_temperature_high(high);
            call.perform();
          } else if (cmd == "stop") {
            ESP_LOGI("mqtt", "CMD stop");
            doughbox_prefs::save_all(0.0f, 3.0f, 5.0f);
            auto call = id(dough_climate).make_call();
            call.set_mode("OFF");
            call.perform();
          } else {
            ESP_LOGW("mqtt", "Unknown cmd: %s", cmd.c_str());
          }

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: bus_a
  frequency: 100000

sensor:
  - platform: bme280_i2c
    id: bme280_1
    i2c_id: bus_a
    address: 0x76
    update_interval: 5s
    temperature:
      name: "Temperature 1"
      id: dough_temp_1
      accuracy_decimals: 1
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
        - offset: -1.5
    humidity:
      name: "Humidity 1"
      id: dough_humidity_1
      accuracy_decimals: 0
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
    pressure:
      name: "Pressure"
      id: dough_pressure
      accuracy_decimals: 0

  - platform: bme280_i2c
    id: bme280_2
    i2c_id: bus_a
    address: 0x77
    update_interval: 5s
    temperature:
      name: "Temperature 2"
      id: dough_temp_2
      accuracy_decimals: 1
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
        - offset: -0.8
    humidity:
      name: "Humidity 2"
      id: dough_humidity_2
      accuracy_decimals: 0
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1

  - platform: template
    name: "Temperature Average"
    id: dough_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    lambda: |-
      if (id(dough_temp_1).has_state() && id(dough_temp_2).has_state()) {
        return (id(dough_temp_1).state + id(dough_temp_2).state) / 2.0;
      } else if (id(dough_temp_1).has_state()) {
        return id(dough_temp_1).state;
      } else if (id(dough_temp_2).has_state()) {
        return id(dough_temp_2).state;
      }
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Humidity Average"
    id: dough_humidity
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    lambda: |-
      if (id(dough_humidity_1).has_state() && id(dough_humidity_2).has_state()) {
        return (id(dough_humidity_1).state + id(dough_humidity_2).state) / 2.0;
      } else if (id(dough_humidity_1).has_state()) {
        return id(dough_humidity_1).state;
      } else if (id(dough_humidity_2).has_state()) {
        return id(dough_humidity_2).state;
      }
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Temperature Difference"
    id: temp_diff
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    lambda: |-
      if (id(dough_temp_1).has_state() && id(dough_temp_2).has_state()) {
        return id(dough_temp_1).state - id(dough_temp_2).state;
      }
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Compressor Lockout Remaining"
    id: compressor_lockout
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-lock"
    lambda: |-
      static unsigned long last_off_time = 0;
      static bool was_on = false;
      bool is_on = id(compressor_relay).state;
      if (was_on && !is_on) {
        last_off_time = millis();
      }
      was_on = is_on;
      if (is_on) {
        return 0;
      }
      if (last_off_time == 0) {
        return 0;
      }
      unsigned long elapsed = (millis() - last_off_time) / 1000;
      if (elapsed >= 300) {
        return 0;
      }
      return 300 - elapsed;
    update_interval: 1s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

switch:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: false
    name: "Relay Power"
    id: relay_power
    icon: "mdi:power"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: GPIO21
      inverted: false
    name: "Heater"
    id: heater_relay
    icon: "mdi:radiator"
    restore_mode: ALWAYS_OFF
    interlock: [compressor_relay]
    interlock_wait_time: 5s
    on_turn_on:
      - if:
          condition:
            lambda: |-
              return id(dough_temp).has_state() && id(dough_temp).state > 28.0f;
          then:
            - switch.turn_off: heater_relay
            - logger.log:
                level: WARN
                format: "HEATER BLOCKED - temp %.1f exceeds 28C turn-on limit"
                args: ["id(dough_temp).state"]

  - platform: gpio
    pin:
      number: GPIO20
      inverted: false
    name: "Compressor"
    id: compressor_relay
    icon: "mdi:snowflake"
    restore_mode: ALWAYS_OFF
    interlock: [heater_relay]
    interlock_wait_time: 5s

  - platform: gpio
    pin:
      number: GPIO10
      inverted: false
    name: "Dehumidifier"
    id: dehumidifier_relay
    icon: "mdi:air-humidifier-off"
    restore_mode: ALWAYS_OFF

  - platform: restart
    name: "Restart"

number:
  - platform: template
    name: "Target Humidity"
    id: target_humidity
    icon: "mdi:water-percent"
    unit_of_measurement: "%"
    min_value: 40
    max_value: 85
    step: 5
    initial_value: 70
    optimistic: true
    restore_value: true
    mode: BOX

  - platform: template
    name: "Humidity Deadband"
    id: humidity_deadband
    icon: "mdi:arrow-expand-horizontal"
    unit_of_measurement: "%"
    min_value: 2
    max_value: 10
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true

globals:
  # Predictive heater cutoff — track previous temp reading and timestamp
  - id: heat_prev_temp
    type: float
    restore_value: false
    initial_value: '0.0'
  - id: heat_prev_time
    type: unsigned long
    restore_value: false
    initial_value: '0'

interval:
  - interval: 30s
    then:
      - lambda: |-
          float current = id(dough_humidity).state;
          float target = id(target_humidity).state;
          float deadband = id(humidity_deadband).state;
          if (isnan(current) || isnan(target)) return;
          if (current > target + deadband) {
            if (!id(dehumidifier_relay).state) {
              id(dehumidifier_relay).turn_on();
              ESP_LOGI("humidity", "Dehumidifier ON - Current: %.1f%%, Target: %.1f%%", current, target);
            }
          } else if (current < target) {
            if (id(dehumidifier_relay).state) {
              id(dehumidifier_relay).turn_off();
              ESP_LOGI("humidity", "Dehumidifier OFF - Current: %.1f%%, Target: %.1f%%", current, target);
            }
          }


  # Predictive heater cutoff — runs every 10s when heater is ON
  # Calculates rate of temperature rise and cuts heater early if the
  # predicted temperature (current + rate × coast_window) will exceed
  # the target_high setpoint. Prevents the 8°C overshoot seen on RT proof.
  - interval: 10s
    then:
      - lambda: |-
          static const float COAST_MINUTES = 3.0f;  // empirical: ~3 min thermal coast after cutoff

          float current = id(dough_temp).state;
          if (isnan(current)) return;

          unsigned long now_ms = millis();

          // When heater is OFF, just keep rolling the reference point
          if (!id(heater_relay).state) {
            id(heat_prev_temp) = current;
            id(heat_prev_time) = now_ms;
            return;
          }

          // Heater is ON — calculate rate of rise
          unsigned long elapsed_ms = now_ms - id(heat_prev_time);

          // Need at least 20s of data before acting
          if (elapsed_ms < 20000 || id(heat_prev_time) == 0) {
            id(heat_prev_temp) = current;
            id(heat_prev_time) = now_ms;
            return;
          }

          float rate_per_min = (current - id(heat_prev_temp)) / (elapsed_ms / 60000.0f);

          // Only act on a positive (rising) rate
          if (rate_per_min <= 0.0f) {
            id(heat_prev_temp) = current;
            id(heat_prev_time) = now_ms;
            return;
          }

          float target_high = id(dough_climate).target_temperature_high;
          float predicted   = current + (rate_per_min * COAST_MINUTES);

          ESP_LOGD("predictive", "Heater ON: temp=%.1f rate=%.2f/min predicted=%.1f target=%.1f",
                   current, rate_per_min, predicted, target_high);

          if (predicted >= target_high) {
            id(heater_relay).turn_off();
            ESP_LOGW("predictive", "EARLY CUTOFF: temp=%.1f rate=%.2f/min predicted=%.1f >= target=%.1f",
                     current, rate_per_min, predicted, target_high);
          }

          id(heat_prev_temp) = current;
          id(heat_prev_time) = now_ms;

  # MQTT state publish: every 2s, retained so remote gets last state on connect
  - interval: 2s
    then:
      - mqtt.publish_json:
          topic: doughbox/state
          retain: true
          payload: |-
            int mode_int = (id(dough_climate).mode == climate::CLIMATE_MODE_HEAT_COOL) ? 1 : 0;
            int action_int = 0;
            switch (id(dough_climate).action) {
              case climate::CLIMATE_ACTION_HEATING: action_int = 2; break;
              case climate::CLIMATE_ACTION_COOLING: action_int = 3; break;
              case climate::CLIMATE_ACTION_IDLE:    action_int = 1; break;
              default:                              action_int = 0; break;
            }
            root["mode"]   = mode_int;
            root["action"] = action_int;
            if (id(dough_temp).has_state() && !std::isnan(id(dough_temp).state))
              root["temp"] = id(dough_temp).state;
            if (id(dough_humidity).has_state() && !std::isnan(id(dough_humidity).state))
              root["hum"] = id(dough_humidity).state;
            root["tlow"]   = id(dough_climate).target_temperature_low;
            root["thigh"]  = id(dough_climate).target_temperature_high;
            root["heat"]   = id(heater_relay).state ? 1 : 0;
            root["cool"]   = id(compressor_relay).state ? 1 : 0;
            root["dh"]     = id(dehumidifier_relay).state ? 1 : 0;
            root["overtemp"] = id(overtemp_flag).state ? 1 : 0;

climate:
  - platform: thermostat
    name: "Climate"
    id: dough_climate
    sensor: dough_temp
    default_preset: Home
    on_boot_restore_from: default_preset
    visual:
      min_temperature: 2
      max_temperature: 35
      temperature_step: 0.5
    min_heating_off_time: 5s
    min_heating_run_time: 5s
    heat_deadband: 0.5
    heat_overrun: 0.3
    min_cooling_off_time: 300s
    min_cooling_run_time: 5s
    cool_deadband: 0.5
    cool_overrun: 0.3
    min_idle_time: 5s
    heat_action:
      - switch.turn_on: heater_relay
      - logger.log: "Heater ON"
    cool_action:
      - switch.turn_on: compressor_relay
      - logger.log: "Compressor ON"
    idle_action:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
      - logger.log: "System IDLE"
    heat_cool_mode:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
    preset:
      - name: Home
        default_target_temperature_low: 4
        default_target_temperature_high: 6
        mode: "off"
      - name: "Cold Ferment"
        default_target_temperature_low: 2.5
        default_target_temperature_high: 4.5
        mode: heat_cool
      - name: "Room Temp"
        default_target_temperature_low: 20
        default_target_temperature_high: 22
        mode: heat_cool
      - name: "Warm Proof"
        default_target_temperature_low: 26
        default_target_temperature_high: 28
        mode: heat_cool

binary_sensor:
  - platform: template
    name: "Over Temperature"
    id: overtemp_flag
    device_class: heat
    lambda: |-
      return id(dough_temp).has_state() && id(dough_temp).state > 30.0f;
    on_press:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
      - logger.log:
          level: ERROR
          format: "OVER-TEMP PROTECTION: %.1f exceeds 30C - all loads cut"
          args: ["id(dough_temp).state"]

  - platform: status
    name: "Status"

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

button:
  - platform: factory_reset
    name: "Factory Reset"
    disabled_by_default: true
