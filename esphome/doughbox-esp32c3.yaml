esphome:
  name: doughbox
  friendly_name: DoughBox
  includes:
    - doughbox_prefs.h
  on_boot:
    priority: 600
    then:
      - switch.turn_off: relay_power
      - delay: 500ms
      - switch.turn_on: relay_power
      - delay: 5s
      - lambda: |-
          float mode = doughbox_prefs::load_mode();
          float low = doughbox_prefs::load_temp_low();
          float high = doughbox_prefs::load_temp_high();
          ESP_LOGI("boot", "Loaded from flash: mode=%.0f, low=%.1f, high=%.1f", mode, low, high);
          if (mode > 0.5f) {
            auto call = id(dough_climate).make_call();
            call.set_mode("HEAT_COOL");
            call.set_target_temperature_low(low);
            call.set_target_temperature_high(high);
            call.perform();
          } else {
            auto call = id(dough_climate).make_call();
            call.set_mode("OFF");
            call.perform();
          }

