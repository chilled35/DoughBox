captive_portal:

# web_server is disabled — the built-in HTTP server consumes a significant
# portion of the ESP32-C3's 400KB SRAM. Re-enable temporarily for on-device
# debugging by uncommenting the two lines below and reflashing.
# web_server:
#   port: 80

mqtt:
  broker: 192.168.0.210
  username: mosquitto
  password: mosquitto
  discovery: false
  birth_message:
    topic: doughbox/status
    payload: online
    retain: true
  will_message:
    topic: doughbox/status
    payload: offline
    retain: true
  on_json_message:
    topic: doughbox/cmd
    then:
      - lambda: |-
          if (x["cmd"].isNull()) {
            ESP_LOGW("mqtt", "Cmd missing 'cmd' field");
            return;
          }
          std::string cmd = x["cmd"].as<std::string>();
          if (cmd == "start") {
            float low  = x["low"]  | 3.0f;
            float high = x["high"] | 5.0f;
            ESP_LOGI("mqtt", "CMD start low=%.1f high=%.1f", low, high);
            doughbox_prefs::save_all(1.0f, low, high);
            auto call = id(dough_climate).make_call();
            call.set_mode("HEAT_COOL");
            call.set_target_temperature_low(low);
            call.set_target_temperature_high(high);
            call.perform();
          } else if (cmd == "stop") {
            ESP_LOGI("mqtt", "CMD stop");
            doughbox_prefs::save_all(0.0f, 3.0f, 5.0f);
            auto call = id(dough_climate).make_call();
            call.set_mode("OFF");
            call.perform();
          } else {
            ESP_LOGW("mqtt", "Unknown cmd: %s", cmd.c_str());
          }

i2c:
  sda: GPIO6
  scl: GPIO7
  scan: true
  id: bus_a
  frequency: 100000

sensor:
  - platform: bme280_i2c
    id: bme280_1
    i2c_id: bus_a
    address: 0x76
    update_interval: 5s
    temperature:
      name: "Temperature 1"
      id: dough_temp_1
      accuracy_decimals: 1
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
        - offset: -1.5
    humidity:
      name: "Humidity 1"
      id: dough_humidity_1
      accuracy_decimals: 0
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
    pressure:
      name: "Pressure"
      id: dough_pressure
      accuracy_decimals: 0

  - platform: bme280_i2c
    id: bme280_2
    i2c_id: bus_a
    address: 0x77
    update_interval: 5s
    temperature:
      name: "Temperature 2"
      id: dough_temp_2
      accuracy_decimals: 1
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1
        - offset: -0.8
    humidity:
      name: "Humidity 2"
      id: dough_humidity_2
      accuracy_decimals: 0
      oversampling: 4x
      filters:
        - sliding_window_moving_average:
            window_size: 3
            send_every: 1

  - platform: template
    name: "Temperature Average"
    id: dough_temp
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    lambda: |-
      float t1 = id(dough_temp_1).has_state() ? id(dough_temp_1).state : NAN;
      float t2 = id(dough_temp_2).has_state() ? id(dough_temp_2).state : NAN;
      bool ok1 = !std::isnan(t1);
      bool ok2 = !std::isnan(t2);
      if (ok1 && ok2) return (t1 + t2) / 2.0f;
      if (ok1) return t1;
      if (ok2) return t2;
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Humidity Average"
    id: dough_humidity
    unit_of_measurement: "%"
    accuracy_decimals: 0
    icon: "mdi:water-percent"
    lambda: |-
      float h1 = id(dough_humidity_1).has_state() ? id(dough_humidity_1).state : NAN;
      float h2 = id(dough_humidity_2).has_state() ? id(dough_humidity_2).state : NAN;
      bool ok1 = !std::isnan(h1);
      bool ok2 = !std::isnan(h2);
      if (ok1 && ok2) return (h1 + h2) / 2.0f;
      if (ok1) return h1;
      if (ok2) return h2;
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Temperature Difference"
    id: temp_diff
    unit_of_measurement: "°C"
    accuracy_decimals: 1
    icon: "mdi:thermometer-lines"
    lambda: |-
      float t1 = id(dough_temp_1).has_state() ? id(dough_temp_1).state : NAN;
      float t2 = id(dough_temp_2).has_state() ? id(dough_temp_2).state : NAN;
      if (!std::isnan(t1) && !std::isnan(t2)) return t1 - t2;
      return NAN;
    update_interval: 5s

  - platform: template
    name: "Compressor Lockout Remaining"
    id: compressor_lockout
    unit_of_measurement: "s"
    accuracy_decimals: 0
    icon: "mdi:timer-lock"
    lambda: |-
      static unsigned long last_off_time = 0;
      static bool was_on = false;
      bool is_on = id(compressor_relay).state;
      if (was_on && !is_on) {
        last_off_time = millis();
      }
      was_on = is_on;
      if (is_on) {
        return 0;
      }
      if (last_off_time == 0) {
        return 0;
      }
      unsigned long elapsed = (millis() - last_off_time) / 1000;
      if (elapsed >= 240) {
        return 0;
      }
      return 240 - elapsed;
    update_interval: 5s

  - platform: wifi_signal
    name: "WiFi Signal"
    update_interval: 60s

  - platform: uptime
    name: "Uptime"
    update_interval: 60s

switch:
  - platform: gpio
    pin:
      number: GPIO9
      inverted: false
    name: "Relay Power"
    id: relay_power
    icon: "mdi:power"
    restore_mode: ALWAYS_OFF

  - platform: gpio
    pin:
      number: GPIO21
      inverted: false
    name: "Heater"
    id: heater_relay
    icon: "mdi:radiator"
    restore_mode: ALWAYS_OFF
    interlock: [compressor_relay]
    interlock_wait_time: 5s
    on_turn_on:
      - if:
          condition:
            lambda: |-
              return id(dough_temp).has_state() && id(dough_temp).state > 28.0f;
          then:
            - switch.turn_off: heater_relay
            - logger.log:
                level: WARN
                format: "HEATER BLOCKED - temp %.1f exceeds 28C turn-on limit"
                args: ["id(dough_temp).state"]

  - platform: gpio
    pin:
      number: GPIO20
      inverted: false
    name: "Compressor"
    id: compressor_relay
    icon: "mdi:snowflake"
    restore_mode: ALWAYS_OFF
    interlock: [heater_relay]
    interlock_wait_time: 5s

  - platform: gpio
    pin:
      number: GPIO10
      inverted: false
    name: "Dehumidifier"
    id: dehumidifier_relay
    icon: "mdi:air-humidifier-off"
    restore_mode: ALWAYS_OFF

  - platform: restart
    name: "Restart"

number:
  - platform: template
    name: "Target Humidity"
    id: target_humidity
    icon: "mdi:water-percent"
    unit_of_measurement: "%"
    min_value: 40
    max_value: 85
    step: 5
    initial_value: 70
    optimistic: true
    restore_value: true
    mode: BOX

  - platform: template
    name: "Humidity Deadband"
    id: humidity_deadband
    icon: "mdi:arrow-expand-horizontal"
    unit_of_measurement: "%"
    min_value: 2
    max_value: 10
    step: 1
    initial_value: 5
    optimistic: true
    restore_value: true

interval:
  - interval: 30s
    then:
      - lambda: |-
          float current = id(dough_humidity).state;
          float target = id(target_humidity).state;
          float deadband = id(humidity_deadband).state;
          if (isnan(current) || isnan(target)) return;
          if (current > target + deadband) {
            if (!id(dehumidifier_relay).state) {
              id(dehumidifier_relay).turn_on();
              ESP_LOGI("humidity", "Dehumidifier ON - Current: %.1f%%, Target: %.1f%%", current, target);
            }
          } else if (current < target) {
            if (id(dehumidifier_relay).state) {
              id(dehumidifier_relay).turn_off();
              ESP_LOGI("humidity", "Dehumidifier OFF - Current: %.1f%%, Target: %.1f%%", current, target);
            }
          }

  - interval: 5s
    then:
      - lambda: |-
          // ── ANTICIPATORY COMPRESSOR CUTOFF ──────────────────────────────
          // Derived from measured coast data (2026-04-21): mean 1.79°C,
          // max 2.01°C overshoot after relay opens. COAST_OFFSET of 1.6°C
          // gives a predicted landing of ~2.8°C (mean) vs 3.0°C target_low,
          // eliminating the previous 1.5–2.0°C undershoot.
          // Bang-bang thermostat remains the authority — this is a layer on top.
          const float COAST_OFFSET = 1.6f;
          static float prev_temp = NAN;
          static unsigned long comp_on_since = 0;

          if (!id(dough_temp).has_state() || std::isnan(id(dough_temp).state)) {
            prev_temp = NAN;
            return;
          }

          float current = id(dough_temp).state;

          if (!id(compressor_relay).state) {
            prev_temp = current;
            comp_on_since = 0;
            return;
          }

          if (comp_on_since == 0) {
            comp_on_since = millis();
          }

          unsigned long run_secs = (millis() - comp_on_since) / 1000;
          if (run_secs < 30) {
            prev_temp = current;
            return;
          }

          float cutoff_point = id(dough_climate).target_temperature_low + COAST_OFFSET;
          bool falling = !std::isnan(prev_temp) && (current < prev_temp);

          if (current <= cutoff_point && falling) {
            id(compressor_relay).turn_off();
            ESP_LOGI("anticipate",
                     "Early cutoff at %.2f°C (target_low %.1f + coast %.1f) after %lus — coasting to ~%.1f°C",
                     current, id(dough_climate).target_temperature_low, COAST_OFFSET,
                     run_secs, current - COAST_OFFSET);
          }

          prev_temp = current;

  - interval: 5s
    then:
      - lambda: |-
          // ── SENSOR WATCHDOG ─────────────────────────────────────────────
          // If both BME280s return NaN for 6 consecutive ticks (30s),
          // cut all loads and publish an MQTT alert.
          static int nan_ticks = 0;
          static bool alert_sent = false;
          bool temp_ok = id(dough_temp).has_state() && !std::isnan(id(dough_temp).state);
          bool hum_ok  = id(dough_humidity).has_state() && !std::isnan(id(dough_humidity).state);
          if (!temp_ok && !hum_ok) {
            nan_ticks++;
            if (nan_ticks >= 6 && !alert_sent) {
              id(heater_relay).turn_off();
              id(compressor_relay).turn_off();
              id(dehumidifier_relay).turn_off();
              alert_sent = true;
              ESP_LOGE("sensor", "BOTH BME280s FAILED for 30s — all loads cut");
              auto &mqtt = *esphome::mqtt::global_mqtt_client;
              mqtt.publish(std::string("doughbox/alert"), std::string("{\"type\":\"sensor_fail\",\"msg\":\"Both BME280s failed for 30s - all loads cut\"}"), (uint8_t)0, false);
            }
          } else {
            if (alert_sent) {
              ESP_LOGI("sensor", "Sensor recovery detected");
              auto &mqtt = *esphome::mqtt::global_mqtt_client;
              mqtt.publish(std::string("doughbox/alert"), std::string("{\"type\":\"sensor_recovery\",\"msg\":\"BME280 sensors recovered\"}"), (uint8_t)0, false);
            }
            nan_ticks = 0;
            alert_sent = false;
          }

  - interval: 10s
    then:
      - mqtt.publish_json:
          topic: doughbox/state
          retain: true
          payload: |-
            int mode_int = (id(dough_climate).mode == climate::CLIMATE_MODE_HEAT_COOL) ? 1 : 0;
            int action_int = 0;
            switch (id(dough_climate).action) {
              case climate::CLIMATE_ACTION_HEATING: action_int = 2; break;
              case climate::CLIMATE_ACTION_COOLING: action_int = 3; break;
              case climate::CLIMATE_ACTION_IDLE:    action_int = 1; break;
              default:                              action_int = 0; break;
            }
            root["mode"]   = mode_int;
            root["action"] = action_int;
            if (id(dough_temp).has_state() && !std::isnan(id(dough_temp).state))
              root["temp"] = id(dough_temp).state;
            if (id(dough_humidity).has_state() && !std::isnan(id(dough_humidity).state))
              root["hum"] = id(dough_humidity).state;
            root["tlow"]   = id(dough_climate).target_temperature_low;
            root["thigh"]  = id(dough_climate).target_temperature_high;
            root["heat"]   = id(heater_relay).state ? 1 : 0;
            root["cool"]   = id(compressor_relay).state ? 1 : 0;
            root["dh"]     = id(dehumidifier_relay).state ? 1 : 0;
            root["overtemp"] = id(overtemp_flag).state ? 1 : 0;

climate:
  - platform: thermostat
    name: "Climate"
    id: dough_climate
    sensor: dough_temp
    default_preset: Home
    visual:
      min_temperature: 2
      max_temperature: 35
      temperature_step: 0.5
    min_heating_off_time: 5s
    min_heating_run_time: 5s
    heat_deadband: 0.5
    heat_overrun: 0.3
    min_cooling_off_time: 240s
    min_cooling_run_time: 5s
    cool_deadband: 0.5
    cool_overrun: 0.3
    min_idle_time: 5s
    heat_action:
      - switch.turn_on: heater_relay
      - logger.log: "Heater ON"
    cool_action:
      - switch.turn_on: compressor_relay
      - logger.log: "Compressor ON"
    idle_action:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
      - logger.log: "System IDLE"
    heat_cool_mode:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
    on_state:
      - lambda: |-
          static int   last_mode = -1;
          static float last_low  = -999.0f;
          static float last_high = -999.0f;
          int   cur_mode = (id(dough_climate).mode == climate::CLIMATE_MODE_HEAT_COOL) ? 1 : 0;
          float cur_low  = id(dough_climate).target_temperature_low;
          float cur_high = id(dough_climate).target_temperature_high;
          if (cur_mode == last_mode && cur_low == last_low && cur_high == last_high) return;
          last_mode = cur_mode; last_low = cur_low; last_high = cur_high;
          doughbox_prefs::save_all(cur_mode ? 1.0f : 0.0f, cur_low, cur_high);
          ESP_LOGI("climate", "Prefs saved: mode=%s low=%.1f high=%.1f",
                   cur_mode ? "HEAT_COOL" : "OFF", cur_low, cur_high);
    preset:
      - name: Home
        default_target_temperature_low: 4
        default_target_temperature_high: 6
        mode: "off"
      - name: "Cold Ferment"
        default_target_temperature_low: 3
        default_target_temperature_high: 5
        mode: heat_cool
      - name: "Room Temp"
        default_target_temperature_low: 20
        default_target_temperature_high: 22
        mode: heat_cool
      - name: "Warm Proof"
        default_target_temperature_low: 26
        default_target_temperature_high: 28
        mode: heat_cool

binary_sensor:
  - platform: template
    name: "Over Temperature"
    id: overtemp_flag
    device_class: heat
    lambda: |-
      return id(dough_temp).has_state() && id(dough_temp).state > 30.0f;
    on_press:
      - switch.turn_off: heater_relay
      - switch.turn_off: compressor_relay
      - logger.log:
          level: ERROR
          format: "OVER-TEMP PROTECTION: %.1f exceeds 30C - all loads cut"
          args: ["id(dough_temp).state"]

  - platform: status
    name: "Status"

text_sensor:
  - platform: version
    name: "ESPHome Version"
  - platform: wifi_info
    ip_address:
      name: "IP Address"
    ssid:
      name: "Connected SSID"
    mac_address:
      name: "MAC Address"

button:
  - platform: factory_reset
    name: "Factory Reset"
    disabled_by_default: true
